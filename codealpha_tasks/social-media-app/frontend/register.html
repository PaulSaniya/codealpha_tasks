<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container">
  <h2>Create Account</h2>

  <button onclick="register()">Register</button>

   <p id="msg"></p>
</div>

<script src="auth.js"></script>

</body>
</html>
