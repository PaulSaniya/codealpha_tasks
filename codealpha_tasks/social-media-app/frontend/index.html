<!DOCTYPE html>
<html>
<head>
  <title>Social App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="navbar">
    <div class="logo">Comfy Connect App</div>
    <div class="profile-menu">
      <div class="profile-circle" id="navAvatar" onclick="toggleMenu()"></div>

      <div id="dropdown" class="dropdown">
    <p onclick="logout()">Logout</p>
  </div>
    </div>
  </div>

  <div class="container">

    <div class="post-box">
      <textarea id="postContent" placeholder="Create a post..."></textarea>

      <div class="post-actions">
      <div style="display:flex; align-items:center;">
        <label class="file-label">
          +
          <input type="file" id="file" onchange="showFileName()">
        </label>

        <span id="fileName" class="file-name"></span>
      </div>

      <button onclick="createPost()" class="post-btn">Post</button>
    </div>

    <!-- ✅ ADD THIS -->
    <div id="feed"></div>

  </div>

<script src="app.js"></script>
</body>
</html>
